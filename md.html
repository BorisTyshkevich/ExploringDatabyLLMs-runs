<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; line-height: 1.6; color: #163244; }
    h1, h2, h3 { color: #0e3a52; }
    a { color: #3c88b5; }
    pre { background: #f3f7fa; padding: 1rem; border-radius: 8px; overflow-x: auto; }
    code { background: #f3f7fa; padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; }
    pre code { background: none; padding: 0; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
    th { background: #f3f7fa; }
    blockquote { border-left: 4px solid #3c88b5; margin: 1rem 0; padding-left: 1rem; color: #5d7485; }
    .back { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <p class="back"><a href="javascript:history.back()">← Back</a></p>
  <div id="content">Loading...</div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');
    if (file) {
      // Get base directory for relative link resolution
      const baseDir = file.substring(0, file.lastIndexOf('/') + 1);
      fetch(file)
        .then(r => r.ok ? r.text() : Promise.reject('File not found'))
        .then(md => {
          document.getElementById('content').innerHTML = marked.parse(md);
          document.title = file.split('/').pop();
          // Fix relative links - rewrite href/src to be relative to markdown file's directory
          document.querySelectorAll('#content a[href], #content img[src]').forEach(el => {
            const attr = el.hasAttribute('href') ? 'href' : 'src';
            const url = el.getAttribute(attr);
            // Skip absolute URLs, anchors, and already-rooted paths
            if (url && !url.startsWith('http') && !url.startsWith('#') && !url.startsWith('/')) {
              el.setAttribute(attr, baseDir + url);
            }
          });
        })
        .catch(e => { document.getElementById('content').innerHTML = '<p>Error: ' + e + '</p>'; });
    } else {
      document.getElementById('content').innerHTML = '<p>No file specified. Use ?file=path/to/file.md</p>';
    }
  </script>
</body>
</html>
